openapi: 3.0.3
info:
  title: VC Platform API (W3C-Aligned)
  version: 2.0.0
paths:
  /v1/credentials/issue:
    post:
      summary: Issue W3C Verifiable Credential (Linked Data Proof)
  /v1/credentials/revoke:
    post:
      summary: Revoke credential via StatusList2021 index
  /v1/status-lists/{id}:
    get:
      summary: Fetch StatusList2021 credential-like resource
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
  /v1/credentials/verify:
    post:
      summary: Verify W3C VC proof + status
  /v1/presentations/verify:
    post:
      summary: Verify VP with challenge/domain anti-replay checks

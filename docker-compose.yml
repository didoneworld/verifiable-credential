version: '3.9'

services:
  issuer-service:
    build:
      context: .
      dockerfile: services/issuer-service/Dockerfile
    env_file:
      - .env
    ports:
      - "4001:4001"
    networks:
      - vc-network

  verifier-service:
    build:
      context: .
      dockerfile: services/verifier-service/Dockerfile
    env_file:
      - .env
    depends_on:
      - issuer-service
    ports:
      - "4002:4002"
    networks:
      - vc-network

networks:
  vc-network:
    driver: bridge
